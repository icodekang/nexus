# Production secrets — managed separately via SealedSecrets / ExternalSecrets / Vault
# Apply with: kubectl apply -f secret-patch.yaml -n nexus
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  OPENAI_API_KEY: "sk-prod-openai-key"
  ANTHROPIC_API_KEY: "sk-ant-api03-..."
  GOOGLE_API_KEY: "AIza..."
  DEEPSEEK_API_KEY: "sk-..."
  CUSTOM_PROVIDERS: ""
