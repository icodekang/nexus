apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-client
  namespace: nexus
  labels:
    app: nexus-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-client
  template:
    metadata:
      labels:
        app: nexus-client
    spec:
      containers:
        - name: nexus-client
          # Build with: docker build -t nexus-client:latest ./app/client/
          # The Dockerfile is in app/client/Dockerfile
          image: nexus-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-client
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: nexus-client
  ports:
    - port: 80
      targetPort: 80
