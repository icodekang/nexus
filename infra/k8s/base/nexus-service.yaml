apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-service
  namespace: nexus
  labels:
    app: nexus-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-service
  template:
    metadata:
      labels:
        app: nexus-service
    spec:
      containers:
        - name: nexus-service
          # Replace with your registry: nexus-service:latest
          image: nexus-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexus-service-config
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:$(POSTGRES_PASSWORD)@postgres:5432/nexus"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: JWT_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: POSTGRES_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: ANTHROPIC_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: GOOGLE_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: DEEPSEEK_API_KEY
            - name: CUSTOM_PROVIDERS
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: CUSTOM_PROVIDERS
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: nexus-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
