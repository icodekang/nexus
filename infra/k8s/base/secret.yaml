# NOTE: In production, create this via sealed-secrets, external-secrets, or gitops
# DO NOT commit real values here — use placeholder values in base/ and override in overlays/
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_PASSWORD: "nexus_dev_password"
  # Provider API keys — populate via: kubectl create secret generic nexus-secrets \
  #   --from-literal=OPENAI_API_KEY=sk-... --namespace=nexus
  # Or use ExternalSecrets Operator pointing to AWS/GCP secret manager
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  DEEPSEEK_API_KEY: ""
  CUSTOM_PROVIDERS: ""
