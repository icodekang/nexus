version: "3.8"

services:
  # ==========================================================================
  # Nexus Service (Rust API Gateway)
  # ==========================================================================
  nexus-service:
    image: nexus-service:latest
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: nexus-service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://nexus:${POSTGRES_PASSWORD:-nexus_dev_password}@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=8080
      # Provider API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # Custom Providers (JSON array)
      - CUSTOM_PROVIDERS=${CUSTOM_PROVIDERS:-}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Nexus Admin (React Dashboard)
  # ==========================================================================
  nexus-admin:
    image: nexus-admin:latest
    build:
      context: ./app/admin
      dockerfile: Dockerfile
    container_name: nexus-admin
    ports:
      - "3000:80"
    depends_on:
      - nexus-service
    restart: unless-stopped
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Nexus Client (React + Vite)
  # ==========================================================================
  nexus-client:
    image: nexus-client:latest
    build:
      context: ./app/client
      dockerfile: Dockerfile
    container_name: nexus-client
    ports:
      - "3001:80"
    environment:
      - API_BASE_URL=http://nexus-service:8080
    depends_on:
      - nexus-service
    restart: unless-stopped
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # External Services (should be running separately or use cloud DB)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./service/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  redisdata:

networks:
  nexus-network:
    driver: bridge