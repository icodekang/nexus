version: "3.8"

services:
  # API Gateway (Rust)
  api:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://nexus:password@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - adapter
    restart: unless-stopped
    networks:
      - nexus-network

  # Python Adapter Service
  adapter:
    build:
      context: ./service/adapters
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    restart: unless-stopped
    networks:
      - nexus-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./service/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - nexus-network

  # Redis (for rate limiting and caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - nexus-network

  # Admin Dashboard
  admin:
    build:
      context: ./app/admin
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - nexus-network

volumes:
  pgdata:
  redisdata:

networks:
  nexus-network:
    driver: bridge
